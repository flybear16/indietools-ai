version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: indietools-db
    environment:
      POSTGRES_USER: indietools
      POSTGRES_PASSWORD: indietools123
      POSTGRES_DB: indietools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indietools"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
